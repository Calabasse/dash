<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Body Composition + Blood Pressure — CHAD_OS</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;--surface:#1a1a24;--surface2:#22222e;--border:#2e2e3e;
  --text:#e0e0f0;--muted:#7070a0;--accent:#4a9eff;--accent2:#7ec8ff;
  --suspect:#ff8c42;--suspect-bg:rgba(255,140,66,.12);
  --sys:#ff6b6b;--dia:#4a9eff;--pulse-c:#6dda6d;
  --trend:rgba(200,200,255,.5);--iqr:rgba(74,158,255,.12);
  --gap:#3a3a50;--grid:rgba(255,255,255,.04);
  --hi:#ffe066;--lo:#66ddff;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'SF Mono','Menlo','Consolas',monospace;
}
html{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5}
body{max-width:1200px;margin:0 auto;padding:0 16px 60px}

/* ── Header ── */
.site-header{padding:20px 0 12px;border-bottom:1px solid var(--border);margin-bottom:16px}
.hdr-row1{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.hdr-title{font-size:20px;font-weight:600;letter-spacing:-.3px}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.badge-offline{background:rgba(74,158,255,.15);color:var(--accent2)}
.badge-fixture{background:rgba(255,200,60,.15);color:#ffd060}
.hdr-meta{margin-top:8px;display:flex;flex-wrap:wrap;gap:16px;font-size:12px;color:var(--muted)}
.hdr-meta span b{color:var(--text)}

/* ── Controls ── */
.controls{display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);margin-bottom:16px}
.range-btns,.nav-btns,.unit-btns{display:flex;gap:4px}
.btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:6px;cursor:pointer;font-size:13px;transition:all .15s}
.btn:hover{border-color:var(--accent);color:var(--text)}
.btn.active{background:rgba(74,158,255,.18);border-color:var(--accent);color:var(--accent2);font-weight:500}
.btn-nav{padding:4px 10px;font-size:16px;line-height:1}
.custom-range{display:none;gap:8px;align-items:center;font-size:13px}
.custom-range input[type=date]{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:3px 8px;border-radius:5px;font-size:12px}
.toggle-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.tog-label{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);cursor:pointer;user-select:none}
.tog-label input{accent-color:var(--accent)}
.tog-label:hover{color:var(--text)}

/* ── Summary cards ── */
.cards{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;min-width:140px;flex:1}
.card-label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.card-value{font-size:22px;font-weight:600;margin:4px 0 2px;letter-spacing:-.5px}
.card-delta{font-size:12px}
.delta-down{color:#6dda6d}
.delta-up{color:#ff8c42}
.delta-flat{color:var(--muted)}
.card-sub{font-size:11px;color:var(--muted)}

/* ── Chart panels ── */
.chart-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;padding:16px}
.chart-panel-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.chart-wrap{position:relative;width:100%;overflow:visible}
.chart-no-data{display:flex;align-items:center;justify-content:center;height:100px;color:var(--muted);font-size:13px}

/* ── SVG chart styles ── */
.chart-svg{display:block;width:100%;overflow:visible}
.axis-line{stroke:#3a3a50;stroke-width:1}
.grid-line{stroke:var(--grid);stroke-width:1}
.axis-text{fill:var(--muted);font-size:11px;font-family:var(--font)}
.axis-text-sm{fill:var(--muted);font-size:10px;font-family:var(--font)}
.chart-title-svg{fill:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;font-family:var(--font)}
.y-label-svg{fill:var(--muted);font-size:11px;font-family:var(--font)}
.trend-label{fill:var(--muted);font-size:11px;font-family:var(--font)}

.pt-valid{fill:var(--accent);opacity:.85;cursor:pointer}
.pt-valid:hover{opacity:1;r:5}
.pt-suspect{fill:none;stroke:var(--suspect);stroke-width:1.5;cursor:pointer;opacity:.8}
.pt-suspect:hover{opacity:1}
.pt-hi{fill:var(--hi)}
.pt-lo{fill:var(--lo)}
.hi-label{fill:var(--hi);font-size:10px;font-family:var(--font)}
.lo-label{fill:var(--lo);font-size:10px;font-family:var(--font)}

.line-path{fill:none;stroke:var(--accent);stroke-width:1.5;stroke-linejoin:round;stroke-linecap:round}
.trend-path{fill:none;stroke:var(--trend);stroke-width:1.5;stroke-dasharray:5 4}
.smoother-path{fill:none;stroke:var(--accent2);stroke-width:1.8;opacity:.6}
.iqr-band{fill:var(--iqr)}
.gap-marker-line{stroke:var(--gap);stroke-width:1;stroke-dasharray:3 3}

/* BP chart */
.bp-seg{stroke-width:1.5;stroke-linecap:round}
.bp-seg-valid{stroke:var(--dia);opacity:.7}
.bp-seg-sys{stroke:var(--sys);opacity:.7}
.pt-sys{fill:var(--sys);opacity:.85;cursor:pointer}
.pt-dia{fill:var(--dia);opacity:.85;cursor:pointer}
.pt-pulse{fill:var(--pulse-c);opacity:.85;cursor:pointer}
.pt-sys:hover,.pt-dia:hover,.pt-pulse:hover{opacity:1}

/* ── Tooltip ── */
.tooltip{position:fixed;background:#1e1e2e;border:1px solid #3a3a60;border-radius:8px;padding:10px 14px;font-size:12px;max-width:260px;z-index:9999;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.tt-date{font-size:11px;color:var(--muted);margin-bottom:4px}
.tt-val{font-size:16px;font-weight:600;margin-bottom:4px}
.tt-tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:4px;margin:1px 2px 1px 0}
.tt-suspect{background:var(--suspect-bg);color:var(--suspect)}
.tt-agg{background:rgba(74,158,255,.12);color:var(--accent2)}
.tt-excluded{background:rgba(80,80,120,.2);color:var(--muted)}
.tt-reason{color:var(--suspect);font-size:11px;margin-top:3px}

/* ── Data quality panel ── */
.dq-table{width:100%;border-collapse:collapse;font-size:12px}
.dq-table th{text-align:left;padding:6px 10px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border)}
.dq-table td{padding:5px 10px;border-bottom:1px solid rgba(255,255,255,.04)}
.dq-table tr:hover td{background:rgba(255,255,255,.03)}
.dq-reason{color:var(--suspect)}
.dq-metric{font-family:var(--mono);font-size:11px;color:var(--accent2)}
.dq-empty{padding:20px;text-align:center;color:var(--muted)}

/* ── Legend ── */
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:8px;font-size:12px;color:var(--muted)}
.leg-item{display:flex;align-items:center;gap:5px}
.leg-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.leg-diamond{width:8px;height:8px;transform:rotate(45deg);display:inline-block;border:1.5px solid var(--suspect);background:none}
</style>
</head>

<script>
(function(){
'use strict';

// ═══ Constants ═══════════════════════════════════════════════════════════════
const KG_LB = 2.2046226218;
const M_IN  = 39.3700787402;
const CM_IN = M_IN / 100;
const MONTH_DAYS = 30.4375;

const GAP_RULES = {
  raw:     10,   // days before gap marker
  daily:   10,
  weekly:  21,
  monthly: 75,
};

const TREND_MIN_PTS = { body: 7, bp: 6, agg: 4 };

const NEUTRAL_THRESHOLDS = {
  weight: 0.25, bmi: 0.08, fat_mass: 0.20,
  fat_free_mass: 0.20, fat_percent: 0.25,
  systolic: 2, diastolic: 2, pulse: 2,
};

// ═══ State ═══════════════════════════════════════════════════════════════════
const D = window.WITHINGS_DATA || {};
const meta = D.meta || {};

const S = {
  range:       'month',
  endDate:     null,   // null = snap to latest data
  customStart: null,
  customEnd:   null,
  units:       (localStorage.getItem('chad_os.withings.units') || 'metric'),
  showSuspect: true,
  showTrend:   true,
  showHighLow: true,
  autoAgg:     true,
  rawOnAgg:    false,
  showGaps:    true,
};

// ═══ Date utilities ═══════════════════════════════════════════════════════════
function parseDt(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function dtStr(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function daysDiff(a,b){ return Math.round((b-a)/86400000); }
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function addMonths(d,n){ const r=new Date(d); r.setMonth(r.getMonth()+n); return r; }
function startOfMonth(d){ return new Date(d.getFullYear(),d.getMonth(),1); }
function fmtDate(d,compact){
  if(compact) return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function fmtDateFull(s){ return fmtDate(parseDt(s)); }

// ═══ Stats ════════════════════════════════════════════════════════════════════
function median(arr){
  if(!arr.length) return NaN;
  const s=[...arr].sort((a,b)=>a-b);
  const m=Math.floor(s.length/2);
  return s.length%2?s[m]:(s[m-1]+s[m])/2;
}
function pct(arr,p){
  if(!arr.length) return NaN;
  const s=[...arr].sort((a,b)=>a-b);
  const i=p*(s.length-1);
  const lo=Math.floor(i),hi=Math.ceil(i);
  return s[lo]+(s[hi]-s[lo])*(i-lo);
}
function theilSen(pts){
  if(pts.length<2) return null;
  const epoch=parseDt(pts[0].d).getTime();
  const norm=pts.map(p=>({x:(parseDt(p.d).getTime()-epoch)/86400000,y:p.v}));
  const slopes=[];
  for(let i=0;i<norm.length-1;i++)
    for(let j=i+1;j<norm.length;j++){
      const dx=norm[j].x-norm[i].x;
      if(dx>0) slopes.push((norm[j].y-norm[i].y)/dx);
    }
  if(!slopes.length) return null;
  slopes.sort((a,b)=>a-b);
  const slope=median(slopes);
  const ic=norm.map(p=>p.y-slope*p.x).sort((a,b)=>a-b);
  return {slope, intercept:median(ic), epoch};
}
function rollingMedian(pts,windowDays){
  return pts.map(p=>{
    const d=parseDt(p.d).getTime();
    const half=windowDays*86400000/2;
    const w=pts.filter(q=>Math.abs(parseDt(q.d).getTime()-d)<=half).map(q=>q.v);
    return {d:p.d,v:median(w)};
  });
}

// ═══ Unit conversion ═════════════════════════════════════════════════════════
function toDisplay(v, metric){
  if(S.units==='imperial'){
    if(['weight','fat_mass','fat_free_mass'].includes(metric)) return v*KG_LB;
    if(metric==='height') return v*M_IN;
  }
  return v;
}
function unitLabel(metric){
  if(S.units==='imperial'){
    if(['weight','fat_mass','fat_free_mass'].includes(metric)) return 'lb';
    if(metric==='height') return 'in';
    if(['weight_trend','fat_mass_trend','fat_free_mass_trend'].includes(metric)) return 'lb/mo';
  }
  if(['weight','fat_mass','fat_free_mass'].includes(metric)) return 'kg';
  if(metric==='height') return 'm';
  if(metric==='fat_percent') return '%';
  if(metric==='bmi') return 'BMI';
  if(['systolic','diastolic'].includes(metric)) return 'mmHg';
  if(metric==='pulse') return 'bpm';
  if(['weight','fat_mass','fat_free_mass'].includes(metric.replace('_trend',''))) return 'kg/mo';
  return '';
}
function fmtVal(v, metric, dp){
  if(isNaN(v)||v===null) return '—';
  const dv=toDisplay(v,metric);
  const d=dp!=null?dp:(metric==='bmi'?1:(metric==='fat_percent'?1:(['systolic','diastolic','pulse'].includes(metric)?0:1)));
  return dv.toFixed(d);
}

// ═══ Visible range ════════════════════════════════════════════════════════════
function allDates(){
  const all=[];
  for(const m of ['weight','fat_mass','fat_percent','fat_free_mass','bmi','systolic','diastolic','pulse']){
    const s=D[m]||[];
    for(const p of s) all.push(parseDt(p.d).getTime());
  }
  return all;
}
function dataExtent(){
  const ts=allDates();
  if(!ts.length) return {min:new Date(),max:new Date()};
  return {min:new Date(Math.min(...ts)),max:new Date(Math.max(...ts))};
}
function getRange(){
  const ext=dataExtent();
  const latest=S.endDate||ext.max;
  if(S.range==='all') return {start:ext.min,end:ext.max};
  if(S.range==='custom') return {start:S.customStart||addDays(latest,-30),end:S.customEnd||latest};
  const map={week:7,month:30,quarter:91,year:365};
  const days=map[S.range]||30;
  return {start:addDays(latest,-days),end:latest};
}
function getAggWindow(){
  if(!S.autoAgg) return 'raw';
  const {start,end}=getRange();
  const d=daysDiff(start,end);
  if(S.range==='year') return 'weekly';
  if(S.range==='all') return 'monthly';
  if(S.range==='custom'){
    if(d<=45) return 'raw';
    if(d<=180) return 'daily';
    if(d<=730) return 'weekly';
    return 'monthly';
  }
  return 'raw'; // week/month/quarter: raw
}

// ═══ Data pipeline ════════════════════════════════════════════════════════════
function filterSeries(metric, showSuspect, start, end){
  const raw=D[metric]||[];
  return raw.filter(p=>{
    const d=parseDt(p.d);
    return d>=start && d<=end && (showSuspect || !p.s);
  });
}
function validOnly(pts){ return pts.filter(p=>!p.s); }

function aggregate(pts, mode, validOnlyFlag){
  if(mode==='raw') return pts;
  const src=validOnlyFlag?validOnly(pts):pts;
  const buckets=new Map();
  for(const p of src){
    let key;
    const dt=parseDt(p.d);
    if(mode==='daily'){
      key=p.d;
    } else if(mode==='weekly'){
      const mon=new Date(dt);
      mon.setDate(dt.getDate()-((dt.getDay()+6)%7));
      key=dtStr(mon);
    } else {
      key=p.d.slice(0,7);
    }
    if(!buckets.has(key)) buckets.set(key,[]);
    buckets.get(key).push(p);
  }
  const result=[];
  const sorted=[...buckets].sort(([a],[b])=>a<b?-1:1);
  for(const [key,bpts] of sorted){
    const vpts=bpts.filter(q=>!q.s);
    const vals=(vpts.length?vpts:bpts).map(q=>q.v);
    let d;
    if(mode==='daily') d=key;
    else if(mode==='weekly'){
      const mon=parseDt(key);
      d=dtStr(addDays(mon,3));
    } else {
      const [yr,mo]=key.split('-').map(Number);
      d=key+'-15';
    }
    result.push({
      d, v:median(vals),
      s: vpts.length===0 && bpts.length>0,
      r: vpts.length===0?'all_suspect_bucket':null,
      isAgg:true, rawCount:bpts.length,
      q1:vals.length>=3?pct(vals,.25):null,
      q3:vals.length>=3?pct(vals,.75):null,
    });
  }
  return result;
}

function getSmoother(pts, range){
  const valid=validOnly(pts);
  if(valid.length<3) return [];
  const wMap={week:3,month:7,quarter:14,year:28,all:92};
  const w=wMap[range]||7;
  return rollingMedian(valid,w);
}

function getTrend(pts, metric){
  const valid=validOnly(pts);
  if(valid.length<TREND_MIN_PTS.body) return null;
  const ts=theilSen(valid);
  if(!ts) return null;
  const slopePerMonth=ts.slope*MONTH_DAYS;
  let dispSlope=slopePerMonth;
  if(S.units==='imperial' && ['weight','fat_mass','fat_free_mass'].includes(metric))
    dispSlope=slopePerMonth*KG_LB;
  const thresh=NEUTRAL_THRESHOLDS[metric]||0.1;
  const convThresh=(S.units==='imperial' && ['weight','fat_mass','fat_free_mass'].includes(metric))
    ?thresh*KG_LB:thresh;
  let dir='flat';
  if(Math.abs(dispSlope)>convThresh) dir=dispSlope<0?'down':'up';
  const unitSuffix=unitLabel(metric)+'/mo';
  const label=dir==='flat'
    ?'Trend: flat'
    :`Trend: ${dir} ${Math.abs(dispSlope).toFixed(2)} ${S.units==='imperial'&&['weight','fat_mass','fat_free_mass'].includes(metric)?'lb/mo':unitLabel(metric)+'/mo'}`;
  return {ts, slopePerMonth, dispSlope, dir, label};
}

function getHighLow(pts){
  const valid=validOnly(pts);
  if(!valid.length) return null;
  let hi=valid[0],lo=valid[0];
  for(const p of valid){
    if(p.v>hi.v || (p.v===hi.v && p.d>hi.d)) hi=p;
    if(p.v<lo.v || (p.v===lo.v && p.d>lo.d)) lo=p;
  }
  return {hi,lo,samePoint:hi.d===lo.d&&hi.v===lo.v};
}

// ═══ SVG scale helpers ════════════════════════════════════════════════════════
function niceTicks(min,max,target){
  if(min===max){ min-=1; max+=1; }
  const range=max-min;
  const raw=range/target;
  const mag=Math.pow(10,Math.floor(Math.log10(raw)));
  let step;
  for(const f of[1,2,2.5,5,10]){
    if(raw<=f*mag){ step=f*mag; break; }
  }
  step=step||mag*10;
  const nMin=Math.floor(min/step)*step;
  const nMax=Math.ceil(max/step)*step;
  const ticks=[];
  for(let t=nMin; t<=nMax+step*0.001; t+=step)
    ticks.push(Math.round(t*1e9)/1e9);
  return {min:nMin,max:nMax,ticks};
}
function dateTicks(start,end,maxT){
  maxT=maxT||6;
  const d=daysDiff(start,end);
  const ticks=[];
  if(d<=14){
    let c=new Date(start); c.setHours(0,0,0,0);
    while(c<=end){ ticks.push(new Date(c)); c=addDays(c,1); }
  } else if(d<=60){
    let c=new Date(start.getFullYear(),start.getMonth(),start.getDate());
    while(c<=end){ if(c.getDay()===1) ticks.push(new Date(c)); c=addDays(c,1); }
  } else if(d<=365){
    let c=new Date(start.getFullYear(),start.getMonth(),1);
    while(c<=end){ if(c>=start) ticks.push(new Date(c)); c=addMonths(c,1); }
  } else if(d<=730){
    let c=new Date(start.getFullYear(),start.getMonth()-((start.getMonth())%3),1);
    while(c<=end){ if(c>=start) ticks.push(new Date(c)); c=addMonths(c,3); }
  } else {
    let c=new Date(start.getFullYear(),0,1);
    while(c<=end){ if(c>=start) ticks.push(new Date(c)); c=addMonths(c,12); }
  }
  // Thin if too many
  while(ticks.length>maxT+2 && ticks.length>4)
    ticks.splice(0,ticks.length,ticks[0],...ticks.slice(1).filter((_,i)=>i%2===0));
  return ticks;
}
function fmtTick(d,rangeStr){
  const opts=rangeStr==='week'||rangeStr==='month'
    ?{month:'short',day:'numeric'}
    :{month:'short',year:'2-digit'};
  return d.toLocaleDateString('en-US',opts);
}

// ═══ SVG builder ═════════════════════════════════════════════════════════════
const CHART_H=230;
const M={t:35,r:20,b:48,l:62};
const POINT_STORE=new Map(); // "panelId|idx" → point data for tooltip

function sv(tag,attrs,inner){
  const a=Object.entries(attrs||{}).map(([k,v])=>`${k}="${v}"`).join(' ');
  return inner!=null?`<${tag} ${a}>${inner}</${tag}>`:`<${tag} ${a}/>`;
}

function buildLinePath(pts,xFn,yFn,gapDays,isAgg){
  let path=''; let prev=null;
  for(const p of pts){
    const d=parseDt(p.d),x=xFn(d),y=yFn(toDisplay(p.v,null));
    if(isNaN(x)||isNaN(y)) continue;
    const gap=prev&&daysDiff(prev,d)>gapDays;
    path+=gap||!prev?`M${x.toFixed(1)},${y.toFixed(1)}`:`L${x.toFixed(1)},${y.toFixed(1)}`;
    prev=d;
  }
  return path;
}

function buildChart(panelId, title, metric, opts){
  opts=opts||{};
  const panel=document.getElementById(panelId);
  if(!panel) return;
  const {start,end}=getRange();
  const aggMode=getAggWindow();
  const allPts=filterSeries(metric,S.showSuspect,start,end);
  const aggPts=aggregate(allPts,aggMode,false);
  const displayPts = (aggMode!=='raw'&&S.rawOnAgg)
    ? [...aggPts,...allPts.filter(p=>!p.s)]
    : aggPts;

  // Determine which pts to use for scales / trend
  const scalePts=aggPts.length?aggPts:allPts;
  const trendPts=aggMode!=='raw'?aggPts:allPts;

  // Apply unit conversion to values for Y scale
  const dispVals=scalePts.filter(p=>!p.s).map(p=>toDisplay(p.v,metric));
  if(!dispVals.length){
    panel.innerHTML=`<div class="chart-panel-title">${title}</div><div class="chart-no-data">No valid data in this window</div>`;
    return;
  }

  const W=panel.clientWidth-32||760;
  const IW=W-M.l-M.r, IH=CHART_H-M.t-M.b;
  const sx=start.getTime(), ex=end.getTime();
  const xFn=d=>(M.l+(d.getTime()-sx)/(ex-sx)*IW);

  const yPad=Math.max((Math.max(...dispVals)-Math.min(...dispVals))*0.12,0.5);
  const ny=niceTicks(Math.min(...dispVals)-yPad,Math.max(...dispVals)+yPad,5);
  const yFn=v=>(M.t+IH-(v-ny.min)/(ny.max-ny.min)*IH);

  // Override yFn to work with raw metric values (convert inside)
  const yFnRaw=v=>yFn(toDisplay(v,metric));

  const parts=[];
  parts.push(`<svg class="chart-svg" viewBox="0 0 ${W} ${CHART_H}" height="${CHART_H}">`);

  // Grid
  for(const t of ny.ticks)
    parts.push(sv('line',{x1:M.l,y1:yFn(t).toFixed(1),x2:M.l+IW,y2:yFn(t).toFixed(1),class:'grid-line'}));
  for(const t of dateTicks(start,end)){
    const x=xFn(t).toFixed(1);
    parts.push(sv('line',{x1:x,y1:M.t,x2:x,y2:M.t+IH,class:'grid-line'}));
  }

  // IQR band
  if(aggMode!=='raw'){
    let bandPath='';
    const bPts=aggPts.filter(p=>p.q1!=null&&p.q3!=null&&!p.s);
    if(bPts.length>=2){
      const fwd=bPts.map(p=>`${xFn(parseDt(p.d)).toFixed(1)},${yFnRaw(p.q3).toFixed(1)}`).join(' ');
      const bwd=[...bPts].reverse().map(p=>`${xFn(parseDt(p.d)).toFixed(1)},${yFnRaw(p.q1).toFixed(1)}`).join(' ');
      bandPath=`M${fwd.split(' ')[0]}L${fwd}L${bwd}Z`;
      parts.push(sv('path',{d:bandPath,class:'iqr-band'}));
    }
  }

  // Smoother line
  if(S.showTrend){
    const smoother=getSmoother(aggMode==='raw'?allPts:aggPts,S.range);
    if(smoother.length>=2){
      const smPath=buildLinePath(smoother.map(p=>({...p,v:p.v})),
        d=>xFn(d instanceof Date?d:parseDt(d.d||d)),
        v=>yFn(toDisplay(v,metric)),
        GAP_RULES[aggMode]||10
      );
      // Hack: smoother pts have d as string
      const sp2=smoother.map(p=>{
        const d=parseDt(p.d); const x=xFn(d).toFixed(1); const y=yFnRaw(p.v).toFixed(1);
        return {x,y};
      });
      let smP='';
      for(let i=0;i<sp2.length;i++) smP+=(i?'L':'M')+sp2[i].x+','+sp2[i].y;
      if(smP) parts.push(`<path d="${smP}" class="smoother-path"/>`);
    }
  }

  // Trend line (Theil-Sen)
  if(S.showTrend){
    const tr=getTrend(trendPts,metric);
    if(tr&&tr.ts){
      const {slope,intercept,epoch}=tr.ts;
      const x0=xFn(start).toFixed(1), y0=yFn(toDisplay(intercept+slope*(start.getTime()-epoch)/86400000,metric)).toFixed(1);
      const x1=xFn(end).toFixed(1),   y1=yFn(toDisplay(intercept+slope*(end.getTime()-epoch)/86400000,metric)).toFixed(1);
      parts.push(`<path d="M${x0},${y0}L${x1},${y1}" class="trend-path"/>`);
      // Trend label top-right
      parts.push(sv('text',{x:M.l+IW-4,y:M.t-8,'text-anchor':'end',class:'trend-label'},tr.label));
    }
  }

  // Connecting lines (valid only)
  const linePts=validOnly(aggMode==='raw'?allPts:aggPts);
  if(linePts.length>=2){
    const lp=buildLinePath(linePts,d=>xFn(d instanceof Date?d:parseDt(String(d))),v=>yFnRaw(v),GAP_RULES[aggMode]||10);
    if(lp) parts.push(`<path d="${lp}" class="line-path"/>`);
  }

  // Gap markers
  if(S.showGaps&&linePts.length>=2){
    const gapDays=GAP_RULES[aggMode]||10;
    for(let i=1;i<linePts.length;i++){
      const diff=daysDiff(parseDt(linePts[i-1].d),parseDt(linePts[i].d));
      if(diff>gapDays){
        const xg=((xFn(parseDt(linePts[i-1].d))+xFn(parseDt(linePts[i].d)))/2).toFixed(1);
        parts.push(sv('line',{x1:xg,y1:M.t,x2:xg,y2:M.t+IH,class:'gap-marker-line'}));
        parts.push(sv('text',{x:xg,y:M.t+IH/2,'text-anchor':'middle',class:'axis-text-sm',fill:'#3a3a60'},'gap'));
      }
    }
  }

  // Data points
  POINT_STORE.delete(panelId);
  const ptStore=new Map();
  const drawPts=aggMode!=='raw'&&S.rawOnAgg?[...aggPts,...allPts.filter(p=>!p.s)]:aggPts;
  const allDrawPts=S.showSuspect?allPts:validOnly(allPts);
  const finalPts=aggMode==='raw'?allDrawPts:drawPts;

  finalPts.forEach((p,i)=>{
    const d=parseDt(p.d);
    const x=xFn(d), y=yFnRaw(p.v);
    if(isNaN(x)||isNaN(y)||x<M.l-5||x>M.l+IW+5) return;
    ptStore.set(i,{...p,metric,dispV:toDisplay(p.v,metric)});
    if(p.s){
      const s=5;
      parts.push(sv('polygon',{
        points:`${x},${(y-s).toFixed(1)} ${(x+s).toFixed(1)},${y} ${x},${(y+s).toFixed(1)} ${(x-s).toFixed(1)},${y}`,
        class:'pt-suspect',
        'data-pt':i,'data-panel':panelId,
      }));
    } else {
      parts.push(sv('circle',{
        cx:x.toFixed(1),cy:y.toFixed(1),r:3.5,
        class:'pt-valid',
        'data-pt':i,'data-panel':panelId,
      }));
    }
  });
  POINT_STORE.set(panelId,ptStore);

  // High/Low
  if(S.showHighLow){
    const hl=getHighLow(aggMode==='raw'?validOnly(allPts):validOnly(aggPts));
    if(hl){
      const pts2=[hl.hi];
      if(!hl.samePoint) pts2.push(hl.lo);
      for(const hp of pts2){
        const isHi=hp===hl.hi;
        const x=xFn(parseDt(hp.d)),y=yFnRaw(hp.v);
        const cls=isHi?'pt-hi':'pt-lo';
        const lcls=isHi?'hi-label':'lo-label';
        parts.push(sv('circle',{cx:x.toFixed(1),cy:y.toFixed(1),r:5,class:cls}));
        const anchor=x>M.l+IW-60?'end':'start';
        const lx=(anchor==='end'?x-7:x+7).toFixed(1);
        const ly=(y-10).toFixed(1);
        parts.push(sv('text',{x:lx,y:ly,'text-anchor':anchor,class:lcls},
          `${fmtVal(hp.v,metric)} ${unitLabel(metric)} · ${fmtDate(parseDt(hp.d),true)}`));
      }
      if(hl.samePoint){
        const x=xFn(parseDt(hl.hi.d)),y=yFnRaw(hl.hi.v);
        parts.push(sv('text',{x:(x+8).toFixed(1),y:(y+4).toFixed(1),class:'axis-text-sm',fill:'#7070a0'},'Only valid point'));
      }
    } else {
      parts.push(sv('text',{x:(M.l+IW/2).toFixed(1),y:(M.t+IH/2).toFixed(1),'text-anchor':'middle',class:'axis-text',fill:'#3a3a50'},'No valid points in this window'));
    }
  }

  // X axis
  parts.push(sv('line',{x1:M.l,y1:M.t+IH,x2:M.l+IW,y2:M.t+IH,class:'axis-line'}));
  for(const t of dateTicks(start,end)){
    const x=xFn(t);
    parts.push(sv('line',{x1:x.toFixed(1),y1:M.t+IH,x2:x.toFixed(1),y2:(M.t+IH+4).toFixed(1),stroke:'#3a3a50','stroke-width':1}));
    parts.push(sv('text',{x:x.toFixed(1),y:(M.t+IH+17).toFixed(1),'text-anchor':'middle',class:'axis-text'},fmtTick(t,S.range)));
  }

  // Y axis
  parts.push(sv('line',{x1:M.l,y1:M.t,x2:M.l,y2:M.t+IH,class:'axis-line'}));
  for(const t of ny.ticks){
    const y=yFn(t);
    parts.push(sv('line',{x1:M.l,y1:y.toFixed(1),x2:(M.l-4).toFixed(1),y2:y.toFixed(1),stroke:'#3a3a50','stroke-width':1}));
    parts.push(sv('text',{x:(M.l-7).toFixed(1),y:y.toFixed(1),'text-anchor':'end','dominant-baseline':'middle',class:'axis-text'},t.toFixed(['systolic','diastolic','pulse'].includes(metric)?0:1)));
  }

  // Y label
  const ul=unitLabel(metric);
  parts.push(sv('text',{
    x:(M.l-48).toFixed(1),y:(M.t+IH/2).toFixed(1),
    transform:`rotate(-90,${(M.l-48).toFixed(1)},${(M.t+IH/2).toFixed(1)})`,
    'text-anchor':'middle',class:'y-label-svg'
  },ul));

  parts.push('</svg>');

  // Aggregate mode badge
  const aggBadge=aggMode!=='raw'?` <span style="font-size:11px;color:var(--muted)">[${aggMode} median]</span>`:'';
  panel.innerHTML=`<div class="chart-panel-title">${title}${aggBadge}</div><div class="chart-wrap">${parts.join('')}</div>`;
  attachTooltips(panel,panelId);
}

// ═══ BP chart ═════════════════════════════════════════════════════════════════
function buildBPChart(panelId){
  const panel=document.getElementById(panelId);
  if(!panel) return;
  const {start,end}=getRange();

  const sysPts=filterSeries('systolic',S.showSuspect,start,end);
  const diaPts=filterSeries('diastolic',S.showSuspect,start,end);
  const pulPts=filterSeries('pulse',S.showSuspect,start,end);

  const allBP=[...sysPts,...diaPts,...pulPts];
  if(!allBP.length){
    panel.innerHTML='<div class="chart-panel-title">Blood Pressure + Pulse</div><div class="chart-no-data">No BP/pulse data in this window</div>';
    return;
  }

  const W=panel.clientWidth-32||760;
  const IW=W-M.l-M.r, IH=CHART_H-M.t-M.b;
  const sx=start.getTime(), ex=end.getTime();
  const xFn=d=>(M.l+(d.getTime()-sx)/(ex-sx)*IW);

  // Combine all valid values for Y scale
  const allVals=[...validOnly(sysPts),...validOnly(diaPts),...validOnly(pulPts)].map(p=>p.v);
  if(!allVals.length){
    panel.innerHTML='<div class="chart-panel-title">Blood Pressure + Pulse</div><div class="chart-no-data">No valid BP/pulse data in this window</div>';
    return;
  }
  const ny=niceTicks(Math.min(...allVals)-8,Math.max(...allVals)+8,5);
  const yFn=v=>(M.t+IH-(v-ny.min)/(ny.max-ny.min)*IH);

  const parts=[];
  parts.push(`<svg class="chart-svg" viewBox="0 0 ${W} ${CHART_H}" height="${CHART_H}">`);

  // Grid
  for(const t of ny.ticks)
    parts.push(sv('line',{x1:M.l,y1:yFn(t).toFixed(1),x2:M.l+IW,y2:yFn(t).toFixed(1),class:'grid-line'}));
  for(const t of dateTicks(start,end)){
    parts.push(sv('line',{x1:xFn(t).toFixed(1),y1:M.t,x2:xFn(t).toFixed(1),y2:M.t+IH,class:'grid-line'}));
  }

  // BP range segments: sys to dia
  const sysByDate=new Map(sysPts.map(p=>[p.d,p]));
  const diaByDate=new Map(diaPts.map(p=>[p.d,p]));
  const allDates=new Set([...sysByDate.keys(),...diaByDate.keys()]);
  for(const d of [...allDates].sort()){
    const s=sysByDate.get(d), di=diaByDate.get(d);
    if(s&&di&&!s.s&&!di.s){
      const x=xFn(parseDt(d));
      parts.push(sv('line',{
        x1:x.toFixed(1),y1:yFn(s.v).toFixed(1),
        x2:x.toFixed(1),y2:yFn(di.v).toFixed(1),
        stroke:'rgba(180,120,120,.4)','stroke-width':3,'stroke-linecap':'round'
      }));
    }
  }

  // Trend lines (sparse, only if ≥6 valid points)
  if(S.showTrend){
    const sysV=validOnly(sysPts), diaV=validOnly(diaPts);
    for(const [pts,cls] of [[sysV,'var(--sys)'],[diaV,'var(--dia)']]){
      if(pts.length>=TREND_MIN_PTS.bp){
        const tr=theilSen(pts);
        if(tr){
          const {slope,intercept,epoch}=tr;
          const y0=yFn(intercept+slope*(start.getTime()-epoch)/86400000).toFixed(1);
          const y1=yFn(intercept+slope*(end.getTime()-epoch)/86400000).toFixed(1);
          parts.push(`<path d="M${xFn(start).toFixed(1)},${y0}L${xFn(end).toFixed(1)},${y1}" class="trend-path" stroke="${cls}"/>`);
        }
      }
    }
  }

  // Points
  const bpPtStore=new Map();
  let idx=0;
  const drawSet=[
    [sysPts,'pt-sys','systolic'],
    [diaPts,'pt-dia','diastolic'],
    [pulPts,'pt-pulse','pulse'],
  ];
  for(const [pts,cls,metric] of drawSet){
    for(const p of pts){
      const d=parseDt(p.d),x=xFn(d),y=yFn(p.v);
      if(isNaN(x)||isNaN(y)) continue;
      bpPtStore.set(idx,{...p,metric,dispV:p.v});
      if(p.s){
        const s=5;
        parts.push(sv('polygon',{
          points:`${x},${(y-s).toFixed(1)} ${(x+s).toFixed(1)},${y} ${x},${(y+s).toFixed(1)} ${(x-s).toFixed(1)},${y}`,
          class:'pt-suspect',
          'data-pt':idx,'data-panel':panelId,
        }));
      } else {
        parts.push(sv('circle',{cx:x.toFixed(1),cy:y.toFixed(1),r:4,class:cls,
          'data-pt':idx,'data-panel':panelId}));
      }
      idx++;
    }
  }
  POINT_STORE.set(panelId,bpPtStore);

  // Axes
  parts.push(sv('line',{x1:M.l,y1:M.t+IH,x2:M.l+IW,y2:M.t+IH,class:'axis-line'}));
  for(const t of dateTicks(start,end)){
    const x=xFn(t);
    parts.push(sv('line',{x1:x.toFixed(1),y1:M.t+IH,x2:x.toFixed(1),y2:(M.t+IH+4).toFixed(1),stroke:'#3a3a50','stroke-width':1}));
    parts.push(sv('text',{x:x.toFixed(1),y:(M.t+IH+17).toFixed(1),'text-anchor':'middle',class:'axis-text'},fmtTick(t,S.range)));
  }
  parts.push(sv('line',{x1:M.l,y1:M.t,x2:M.l,y2:M.t+IH,class:'axis-line'}));
  for(const t of ny.ticks){
    const y=yFn(t);
    parts.push(sv('line',{x1:M.l,y1:y.toFixed(1),x2:(M.l-4).toFixed(1),y2:y.toFixed(1),stroke:'#3a3a50','stroke-width':1}));
    parts.push(sv('text',{x:(M.l-7).toFixed(1),y:y.toFixed(1),'text-anchor':'end','dominant-baseline':'middle',class:'axis-text'},t));
  }
  parts.push(sv('text',{x:(M.l-48).toFixed(1),y:(M.t+IH/2).toFixed(1),
    transform:`rotate(-90,${(M.l-48).toFixed(1)},${(M.t+IH/2).toFixed(1)})`,
    'text-anchor':'middle',class:'y-label-svg'},'mmHg / bpm'));

  // Legend
  const leg=`<div class="legend">
    <div class="leg-item"><span class="leg-dot" style="background:var(--sys)"></span>Systolic</div>
    <div class="leg-item"><span class="leg-dot" style="background:var(--dia)"></span>Diastolic</div>
    <div class="leg-item"><span class="leg-dot" style="background:var(--pulse-c)"></span>Pulse</div>
    <div class="leg-item"><span class="leg-diamond"></span>Suspect</div>
  </div>`;

  parts.push('</svg>');
  panel.innerHTML=`<div class="chart-panel-title">Blood Pressure + Pulse</div>${leg}<div class="chart-wrap">${parts.join('')}</div>`;
  attachTooltips(panel,panelId);
}

// ═══ Tooltip ══════════════════════════════════════════════════════════════════
function attachTooltips(panel,panelId){
  panel.addEventListener('mouseover',e=>{
    const el=e.target.closest('[data-pt]');
    if(!el) return;
    const i=parseInt(el.dataset.pt);
    const store=POINT_STORE.get(panelId);
    if(!store) return;
    const p=store.get(i);
    if(!p) return;
    showTooltip(p,e.clientX,e.clientY);
  });
  panel.addEventListener('mouseleave',()=>hideTooltip());
  panel.addEventListener('mousemove',e=>{
    const tt=document.getElementById('tooltip');
    if(tt.style.display==='none') return;
    posTooltip(e.clientX,e.clientY);
  });
}
function showTooltip(p,cx,cy){
  const tt=document.getElementById('tooltip');
  const metric=p.metric;
  const ul=unitLabel(metric);
  const val=`${fmtVal(p.v,metric)} ${ul}`;
  let tags='';
  if(p.s) tags+=`<span class="tt-tag tt-suspect">Suspect: ${p.r||'unknown'}</span>`;
  if(p.isAgg) tags+=`<span class="tt-tag tt-agg">Agg (n=${p.rawCount})</span>`;
  if(p.s) tags+=`<br><span class="tt-excluded">Excluded from trend &amp; high/low</span>`;
  tt.innerHTML=`<div class="tt-date">${fmtDateFull(p.d)} · ${metric.replace(/_/g,' ')}</div><div class="tt-val">${val}</div>${tags}`;
  tt.style.display='block';
  posTooltip(cx,cy);
}
function posTooltip(cx,cy){
  const tt=document.getElementById('tooltip');
  const w=tt.offsetWidth,h=tt.offsetHeight;
  let x=cx+14, y=cy-10;
  if(x+w>window.innerWidth-10) x=cx-w-14;
  if(y+h>window.innerHeight-10) y=cy-h-10;
  tt.style.left=x+'px';
  tt.style.top=y+'px';
}
function hideTooltip(){ document.getElementById('tooltip').style.display='none'; }

// ═══ Summary cards ════════════════════════════════════════════════════════════
function buildCards(){
  const {start,end}=getRange();
  function latestValid(metric){
    const pts=filterSeries(metric,false,new Date(0),end).filter(p=>!p.s);
    return pts.length?pts[pts.length-1]:null;
  }
  const cards=[
    {label:'Weight',       metric:'weight',      extra:null},
    {label:'BMI',          metric:'bmi',         extra:null},
    {label:'Fat %',        metric:'fat_percent',  extra:'%'},
    {label:'Fat Mass',     metric:'fat_mass',    extra:null},
    {label:'Blood Pressure',metric:'systolic',   extra:'bp'},
  ];
  const el=document.getElementById('summary-cards');
  let html='';
  for(const c of cards){
    const p=latestValid(c.metric);
    if(c.extra==='bp'){
      const s=latestValid('systolic'),d=latestValid('diastolic');
      const val=s&&d?`${s.v.toFixed(0)}/${d.v.toFixed(0)}`:s?s.v.toFixed(0):'—';
      const pu=latestValid('pulse');
      html+=`<div class="card"><div class="card-label">Blood Pressure</div>
        <div class="card-value">${val}</div>
        <div class="card-sub">${s?fmtDateFull(s.d):''} · mmHg${pu?` · Pulse ${pu.v.toFixed(0)} bpm`:''}</div></div>`;
      continue;
    }
    if(!p){ html+=`<div class="card"><div class="card-label">${c.label}</div><div class="card-value" style="color:var(--muted)">—</div><div class="card-sub">No data</div></div>`; continue; }
    const vDisp=toDisplay(p.v,c.metric);
    const ul=c.extra||unitLabel(c.metric);
    html+=`<div class="card"><div class="card-label">${c.label}</div>
      <div class="card-value">${vDisp.toFixed(c.metric==='bmi'?1:1)} <span style="font-size:13px;font-weight:400;color:var(--muted)">${ul}</span></div>
      <div class="card-sub">${fmtDateFull(p.d)}</div></div>`;
  }
  el.innerHTML=html;
}

// ═══ Header metadata ══════════════════════════════════════════════════════════
function buildHeader(){
  const el=document.getElementById('hdr-meta');
  const {last_import_date,trusted_height_m,height_confidence,record_counts,source}=meta;
  const hStr=trusted_height_m&&height_confidence!=='none'
    ?`Trusted height: <b>${(trusted_height_m*100).toFixed(0)} cm</b> (${height_confidence} confidence)`
    :'Height: <b>unavailable</b>';
  const rc=record_counts||{};
  const counts=Object.entries(rc).map(([k,v])=>`${k.replace(/_/g,' ')}: <b>${v}</b>`).join(' · ');
  el.innerHTML=`<span>Source: <b>${source||'Withings export'}</b></span>
    <span>Last import: <b>${last_import_date||'unknown'}</b></span>
    <span>${hStr}</span>
    <span>${counts}</span>`;
  const sb=document.getElementById('source-badge');
  if(source&&source.includes('fixture')){
    sb.textContent='Fixture data — not real'; sb.style.display='';
    sb.className='badge badge-fixture';
  }
}

// ═══ Data quality panel ═══════════════════════════════════════════════════════
function buildQualityPanel(panelId){
  const panel=document.getElementById(panelId);
  if(!panel) return;
  const {start,end}=getRange();
  const allSuspect=[];
  for(const metric of['weight','fat_mass','fat_percent','fat_free_mass','bmi','systolic','diastolic','pulse']){
    const pts=filterSeries(metric,true,start,end);
    for(const p of pts) if(p.s) allSuspect.push({...p,metric});
  }
  allSuspect.sort((a,b)=>a.d<b.d?-1:1);

  if(!allSuspect.length){
    panel.innerHTML=`<div class="chart-panel-title">Data Quality — Suspect Points</div><div class="dq-empty">No suspect points in this window</div>`;
    return;
  }

  const rows=allSuspect.map(p=>`<tr>
    <td>${fmtDateFull(p.d)}</td>
    <td class="dq-metric">${p.metric.replace(/_/g,' ')}</td>
    <td>${fmtVal(p.v,p.metric)} ${unitLabel(p.metric)}</td>
    <td class="dq-reason">${p.r||'unknown'}</td>
    <td style="color:var(--muted)">Excluded from trend &amp; high/low</td>
  </tr>`).join('');

  panel.innerHTML=`<div class="chart-panel-title">Data Quality — ${allSuspect.length} Suspect Point${allSuspect.length!==1?'s':''} in Window</div>
    <table class="dq-table"><thead><tr><th>Date</th><th>Metric</th><th>Value</th><th>Reason</th><th>Impact</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}

// ═══ Full render ══════════════════════════════════════════════════════════════
function renderAll(){
  buildHeader();
  buildCards();
  buildChart('panel-weight',      'Weight',             'weight');
  if(meta.height_confidence&&meta.height_confidence!=='none')
    buildChart('panel-bmi',       'BMI',                'bmi');
  else
    document.getElementById('panel-bmi').innerHTML=
      '<div class="chart-panel-title">BMI</div><div class="chart-no-data">BMI unavailable — no trusted height</div>';
  buildChart('panel-fat-mass',    'Fat Mass',           'fat_mass');
  buildChart('panel-fat-free-mass','Fat-Free Mass (Lean)','fat_free_mass');
  buildChart('panel-fat-percent', 'Fat Percent',        'fat_percent');
  buildBPChart('panel-bp');
  buildChart('panel-pulse',       'Pulse',              'pulse');
  buildQualityPanel('panel-dq');
}

// ═══ Controls ═════════════════════════════════════════════════════════════════
function savePrefs(){
  try{
    localStorage.setItem('chad_os.withings.units',S.units);
    localStorage.setItem('chad_os.withings.dashboard_prefs',JSON.stringify({
      range:S.range,showSuspect:S.showSuspect,showTrend:S.showTrend,
      showHighLow:S.showHighLow,autoAgg:S.autoAgg,rawOnAgg:S.rawOnAgg,showGaps:S.showGaps,
    }));
  }catch(e){}
}
function loadPrefs(){
  try{
    const p=JSON.parse(localStorage.getItem('chad_os.withings.dashboard_prefs')||'{}');
    if(p.range) S.range=p.range;
    if('showSuspect' in p) S.showSuspect=p.showSuspect;
    if('showTrend' in p) S.showTrend=p.showTrend;
    if('showHighLow' in p) S.showHighLow=p.showHighLow;
    if('autoAgg' in p) S.autoAgg=p.autoAgg;
    if('rawOnAgg' in p) S.rawOnAgg=p.rawOnAgg;
    if('showGaps' in p) S.showGaps=p.showGaps;
  }catch(e){}
}

function stepPeriod(dir){
  const {start,end}=getRange();
  const ext=dataExtent();
  if(S.range==='all') return;
  const w=daysDiff(start,end);
  if(S.range==='custom'){
    S.customStart=addDays(S.customStart||start,dir*w);
    S.customEnd=addDays(S.customEnd||end,dir*w);
    document.getElementById('inp-cstart').value=dtStr(S.customStart);
    document.getElementById('inp-cend').value=dtStr(S.customEnd);
  } else {
    const newEnd=addDays(S.endDate||ext.max,dir*w);
    if(newEnd>ext.max) S.endDate=new Date(ext.max);
    else if(newEnd<addDays(ext.min,w)) S.endDate=addDays(ext.min,w);
    else S.endDate=newEnd;
  }
  renderAll();
}

function setRange(r){
  S.range=r;
  const cr=document.getElementById('custom-range');
  cr.style.display=r==='custom'?'flex':'none';
  if(r==='all'||r!=='custom') S.endDate=null;
  document.querySelectorAll('.btn-range').forEach(b=>b.classList.toggle('active',b.dataset.range===r));
  renderAll(); savePrefs();
}

function setUnits(u){
  S.units=u;
  document.querySelectorAll('.btn-unit').forEach(b=>b.classList.toggle('active',b.dataset.units===u));
  renderAll(); savePrefs();
}

function initControls(){
  document.querySelectorAll('.btn-range').forEach(b=>b.addEventListener('click',()=>setRange(b.dataset.range)));
  document.querySelectorAll('.btn-unit').forEach(b=>b.addEventListener('click',()=>setUnits(b.dataset.units)));
  document.getElementById('btn-prev').addEventListener('click',()=>stepPeriod(-1));
  document.getElementById('btn-next').addEventListener('click',()=>stepPeriod(1));
  document.getElementById('btn-latest').addEventListener('click',()=>{ S.endDate=null; renderAll(); });
  document.getElementById('tog-suspect').addEventListener('change',e=>{ S.showSuspect=e.target.checked; renderAll(); savePrefs(); });
  document.getElementById('tog-trend').addEventListener('change',e=>{ S.showTrend=e.target.checked; renderAll(); savePrefs(); });
  document.getElementById('tog-highlow').addEventListener('change',e=>{ S.showHighLow=e.target.checked; renderAll(); savePrefs(); });
  document.getElementById('tog-agg').addEventListener('change',e=>{ S.autoAgg=e.target.checked; renderAll(); savePrefs(); });
  document.getElementById('tog-rawonAgg').addEventListener('change',e=>{ S.rawOnAgg=e.target.checked; renderAll(); savePrefs(); });
  document.getElementById('tog-gaps').addEventListener('change',e=>{ S.showGaps=e.target.checked; renderAll(); savePrefs(); });
  document.getElementById('inp-cstart').addEventListener('change',e=>{ S.customStart=parseDt(e.target.value); renderAll(); });
  document.getElementById('inp-cend').addEventListener('change',e=>{ S.customEnd=parseDt(e.target.value); renderAll(); });

  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowLeft'&&!e.target.matches('input')) stepPeriod(-1);
    if(e.key==='ArrowRight'&&!e.target.matches('input')) stepPeriod(1);
    if(e.key==='Escape') hideTooltip();
  });

  // Sync UI state from S
  document.querySelectorAll('.btn-range').forEach(b=>b.classList.toggle('active',b.dataset.range===S.range));
  document.querySelectorAll('.btn-unit').forEach(b=>b.classList.toggle('active',b.dataset.units===S.units));
  document.getElementById('tog-suspect').checked=S.showSuspect;
  document.getElementById('tog-trend').checked=S.showTrend;
  document.getElementById('tog-highlow').checked=S.showHighLow;
  document.getElementById('tog-agg').checked=S.autoAgg;
  document.getElementById('tog-rawonAgg').checked=S.rawOnAgg;
  document.getElementById('tog-gaps').checked=S.showGaps;
}

// ═══ Init ════════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded',function(){
  loadPrefs();
  initControls();
  // Snap to latest data date by default
  const ext=dataExtent();
  S.endDate=new Date(ext.max);
  renderAll();
});

})();
</script>
