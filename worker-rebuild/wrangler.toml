name = "dash-rebuild"
main = "rebuild.js"
compatibility_date = "2024-11-01"

# Public, non-secret config.
[vars]
# CORS allowlist — your GitHub Pages origin, no trailing slash (comma-separate for more).
ALLOWED_ORIGIN = "https://calabasse.github.io"
# Minimum seconds between accepted rebuilds (abuse + KV-write backstop).
RATE_LIMIT_SECONDS = "600"

# KV namespace holding the single rebuild-state key. Create it, then paste the id:
#   wrangler kv namespace create REBUILD_KV
[[kv_namespaces]]
binding = "REBUILD_KV"
id = "58de645c4734480caa1c48b25ae88b53"

# Shared secret with the Mac poller (never committed):
#   wrangler secret put POLLER_TOKEN
